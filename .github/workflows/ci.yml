name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: laperla_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d laperla_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/laperla_ci
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/laperla_ci
      AUTH_SECRET: ci-auth-secret-min-16-chars-required
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      PLAYWRIGHT_PORT: "4173"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Prisma migrate
        run: npx prisma migrate deploy

      - name: Seed (E2E ve yerel admin)
        run: npx prisma db seed

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E smoke
        run: npm run test:e2e
        env:
          CI: true
